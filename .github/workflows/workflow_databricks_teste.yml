name: Test Databricks Deploy
run-name: ${{ github.actor }} is testing out GitHub Actions

on:
  workflow_dispatch:

jobs:
  test-databricks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Databricks CLI
        run: pip install databricks-cli

      - name: Configurar autenticação Databricks
        run: |
          mkdir -p ~/.databrickscfg
          echo "[DEFAULT]" > ~/.databrickscfg
          echo "host = ${{ secrets.DATABRICKS_HOST }}" >> ~/.databrickscfg
          echo "token = ${{ secrets.DATABRICKS_TOKEN }}" >> ~/.databrickscfg

      - name: Testar conexão
        run: databricks workspace ls /